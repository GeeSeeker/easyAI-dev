# easyAI 框架配置

# 框架基本信息
framework:
  name: easyAI
  version: "3.6.0" # 与 .easyai-version 保持一致
  description: "让用户以纯客户的视角进行软件开发"

# 用户交互级别（架构 §5.4 · 核心需求 #2 自适应交互）
# AI 根据此配置调整输出详细度和引导方式
user_level: intermediate # novice | intermediate | expert

# 开发者信息（init 后由 AI 引导填写，PM 启动时硬性校验）
developer:
  name: "" # 你的名字 → workspace/{name}/ 文件夹名，为空时 PM 启动会阻断并引导填写

# 可调用的外部 CLI（AI 在需要时自动调用）
# 示例: ["codex", "claude", "gemini"]
external_cli: []

# 核心规范（AI 必须强制遵守，不可跳过）
# 示例: ["所有 API 必须有错误处理", "禁止使用 any 类型"]
core_rules: []

# 强制规定（被 MCP 自动注入，运行时硬拦截）
# 示例: ["任务必须经 PM 审批才能开始", "Worker 禁止 push 代码"]
mcp_enforced: []

# 其他功能（AI 分析后自行补充）
features: []

# MCP Server 配置
mcp:
  server:
    name: easyai-mcp-server
    transport: stdio

# 任务管理配置
tasks:
  root: .trellis/tasks
  archive: .trellis/tasks/archive
  max_subtasks: 10 # 单任务最大子任务数
  # TODO: auto_freeze: true      — 待 MCP task-transition.ts 实现 config 读取后启用
  # TODO: stale_detection: true   — 待 MCP 实现 context-snapshot 哈希对比后启用
  statuses:
    - pending # 待分配
    - in_progress # 执行中
    - under_review # 待验收
    - completed # 已完成
    - archived # 已归档
    - cancelled # 已取消
    - rejected # 打回

# 记忆系统配置
journal:
  root: .trellis/workspace
  maxLinesPerFile: 2000
  dateFormat: "YYYY-MM-DD"
  # TODO: auto_archive_days: 30  — 待 MCP 实现自动归档逻辑后启用

# 规范文件配置
spec:
  root: .trellis/spec
  schemaFile: .trellis/spec/spec-schema.json
  categories:
    - frontend
    - backend
    - guides
    - general # 项目级通用规范（命名约定、Git 流程等）

# 上下文预算配置
context:
  warningThreshold: 0.6 # 60% 时开始降级（与 MCP context-budget.ts 运行时一致）
  criticalThreshold: 0.8 # 80% 时建议新会话（与 MCP context-budget.ts 运行时一致）
  auto_downgrade: true # 超过 warning 阈值时自动降级 recommended → deferred
  phaseBudget:
    plan: 40000
    implement: 60000
    check: 30000
    debug: 50000

# 任务路由配置（F39 + O3）
# PM 创建任务时根据此配置推荐审查策略和执行模式
routing:
  # 风险等级 → 审查策略映射
  risk_review_mapping:
    low: "pm_self_review" # 🟢 PM 自审，跳过代码风格细节
    medium: "single_cli_review" # 🟡 1 个外部 CLI 审查
    high: "dual_cli_review" # 🔴 2 个外部 CLI 并行审查
    critical: "dual_cli_plus_internal" # ⚫ 2 个外部 CLI + PM 独立验证

  # 低风险变更类型白名单（F41）— 匹配时自动标记为 🟢 低风险
  # 注意：.agents/ 和 .trellis/spec/ 下的文件始终为高风险，不受白名单影响（见 review-standards）
  low_risk_whitelist:
    - "docs_only" # 纯文档变更（.md 文件）
    - "config_change" # 配置文件变更（.yaml / .json）
    - "style_tweak" # 样式微调（CSS / 缩进 / 格式化）
    - "wording_fix" # 措辞优化（文案 / 注释 / 日志文本）
    - "test_addition" # 纯测试新增（不改生产代码）
    - "task_board" # 看板维护（任务创建 / 归档）

# AI 团队资源清单（F43）
# PM 做任务路由决策时参考此配置选择审查者
team:
  roster:
    - name: "Antigravity (主控 AI)"
      type: "primary" # 主控 AI，不作为外部审查者
      strengths:
        - "全栈开发"
        - "项目管理"
        - "需求分析"
      concurrency: 1 # 单会话

    - name: "Codex CLI"
      type: "external_cli"
      mcp_tool: "mcp_codexmcp_codex"
      strengths:
        - "后端逻辑"
        - "算法分析"
        - "安全检查"
        - "代码执行验证"
      concurrency: 1 # 单实例

    - name: "Claude Code"
      type: "external_cli"
      mcp_tool: "mcp_claude-code-mcp_claude_code"
      strengths:
        - "代码审查"
        - "架构分析"
        - "重构建议"
        - "多文件关联分析"
      concurrency: 1 # 单实例

    - name: "Gemini CLI"
      type: "external_cli"
      mcp_tool: "mcp_geminimcp_gemini"
      strengths:
        - "前端审查"
        - "可维护性分析"
        - "模式一致性检查"
      concurrency: 1 # 单实例
